[build]
builder = "NIXPACKS"

[deploy]
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/v1/health"
healthcheckTimeout = 30

# Step 10: Railway native cron. Each [[cron]] block spawns a fresh container
# that runs the `command` and exits. They share the deploy's image + env vars,
# so SessionLocal / Firebase creds / ADMIN_TOKEN all work without extra setup.
#
# Schedules are UTC (D15). Generation runs every 6 hours (00:00, 06:00, 12:00,
# 18:00) so the review queue stays topped up even if Will reviews in batches.
# Push fires once daily at 00:00 UTC — the canonical "new day" boundary that
# matches /today's date keying.
[[cron]]
schedule = "0 */6 * * *"
command = "python -m app.cron run_generation"

[[cron]]
schedule = "0 0 * * *"
command = "python -m app.cron run_push"
