[build]
builder = "NIXPACKS"

[deploy]
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/v1/health"
healthcheckTimeout = 30

# Cron services live in dedicated Railway services with their own config files:
#   - push-cron service uses /railway.push-cron.toml
#   - generation-cron service uses /railway.generation-cron.toml
# This file controls only the API service. See Backend Architecture for the pattern.
#
# Push Forensics 2 (2026-04-30) confirmed that [[cron]] blocks in this file with
# per-cron `command` fields are not honored by Railway — only the service's
# dashboard Cron Schedule + Custom Start Command (or its config-as-code equivalent)
# fire on the schedule. The decorative blocks have been stripped to remove the
# footgun.
